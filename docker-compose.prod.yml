# Production stack: PostgreSQL, Rails API + Solid Queue worker, Next.js portal,
# Expo web (static nginx), and Caddy reverse proxy.
#
# Quick start (from the repository root):
#   cp .env.production.example .env.production
#   # Fill secrets in .env.production (see docs/deployment.md)
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# Do not use this file for local development — use docker-compose.yml instead.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - paag

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_QUEUE_NAME: ${POSTGRES_DB}_queue
      APP_NAME: ${APP_NAME:-PAAG}
      APP_WEB_URL: ${APP_WEB_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_FEEDBACK_ENABLED: ${AI_FEEDBACK_ENABLED:-true}
      LTI_TOOL_PRIVATE_KEY_PATH: ${LTI_TOOL_PRIVATE_KEY_PATH:-/rails/config/lti_keys/tool_private.pem}
      SEED_PASSWORD: ${SEED_PASSWORD:-}
    volumes:
      - lti_keys:/rails/config/lti_keys
      - rails_storage:/rails/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:80/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped
    networks:
      - paag

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    command: ["bin/jobs"]
    environment:
      RAILS_ENV: production
      RAILS_LOG_TO_STDOUT: "true"
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_QUEUE_NAME: ${POSTGRES_DB}_queue
      APP_NAME: ${APP_NAME:-PAAG}
      APP_WEB_URL: ${APP_WEB_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_FEEDBACK_ENABLED: ${AI_FEEDBACK_ENABLED:-true}
      LTI_TOOL_PRIVATE_KEY_PATH: ${LTI_TOOL_PRIVATE_KEY_PATH:-/rails/config/lti_keys/tool_private.pem}
      # api owns db:prepare; the worker must not migrate concurrently.
      SKIP_DB_PREPARE: "true"
    volumes:
      - lti_keys:/rails/config/lti_keys
      - rails_storage:/rails/storage
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'solid-queue|jobs' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - paag

  portal:
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
      args:
        RAILS_API_URL: ${PORTAL_RAILS_API_URL:-http://api:80}
        NEXT_BASE_PATH: ${NEXT_BASE_PATH:-/portal}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      RAILS_API_URL: ${PORTAL_RAILS_API_URL:-http://api:80}
      NEXT_BASE_PATH: ${NEXT_BASE_PATH:-/portal}
      ADMIN_SECRET: ${ADMIN_SECRET:-}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080${NEXT_BASE_PATH:-/portal}/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    restart: unless-stopped
    networks:
      - paag

  web:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile.web
      args:
        EXPO_PUBLIC_APP_ENV: production
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
        EXPO_PUBLIC_VAR_NUMBER: ${EXPO_PUBLIC_VAR_NUMBER:-10}
        EXPO_PUBLIC_VAR_BOOL: ${EXPO_PUBLIC_VAR_BOOL:-true}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - paag

  proxy:
    image: caddy:2.10-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # http://localhost for local smoke; set to your hostname (no scheme) for TLS.
      CADDY_SITE: ${CADDY_SITE:-http://localhost}
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      portal:
        condition: service_healthy
      web:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    restart: unless-stopped
    networks:
      - paag

volumes:
  postgres_data:
  lti_keys:
  rails_storage:
  caddy_data:
  caddy_config:

networks:
  paag:
    driver: bridge
