default: &default
  adapter: postgresql
  encoding: unicode
  reconnect: false
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 30 } %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", 5432) %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  primary:
    <<: *default
    database: <%= ENV.fetch("DB_NAME", "template_development") %>
  # Solid Queue lives in its own database so the worker can be scaled and
  # migrated independently (mirrors the production connects_to setup). Its
  # tables are loaded from db/queue_schema.rb by `bin/rails db:prepare`.
  queue:
    <<: *default
    database: <%= ENV.fetch("DB_QUEUE_NAME", "template_development_queue") %>
    migrations_paths: db/queue_migrate

test:
  <<: *default
  database: <%= ENV.fetch("DB_TEST_NAME", "template_test") %>

# Production uses Solid Cache / Solid Queue / Solid Cable — each needs its own
# Postgres database (see config/cache.yml, solid_queue.connects_to, cable.yml).
production:
  primary: &primary_production
    <<: *default
    host: <%= ENV["DB_HOST"] %>
    database: <%= ENV["DB_NAME"] %>
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CACHE_NAME") { "#{ENV["DB_NAME"]}_cache" } %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV.fetch("DB_QUEUE_NAME") { "#{ENV["DB_NAME"]}_queue" } %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV.fetch("DB_CABLE_NAME") { "#{ENV["DB_NAME"]}_cable" } %>
    migrations_paths: db/cable_migrate
